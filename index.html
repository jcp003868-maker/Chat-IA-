<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Chatbot con OpenRouter</title>
  <style>
    /* ── Reset y variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f4f0;
      --surface:   #ffffff;
      --border:    #e0ddd5;
      --text:      #1a1a18;
      --muted:     #6b6b66;
      --accent:    #5b4edb;
      --accent-h:  #4a3ec9;
      --bubble-me: #5b4edb;
      --bubble-ai: #ffffff;
      --radius:    14px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Contenedor principal ── */
    .chat-app {
      width: 100%;
      max-width: 680px;
      height: 100dvh;
      max-height: 800px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 4px 32px rgba(0,0,0,.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Cabecera ── */
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    header h1 { font-size: 16px; font-weight: 600; }
    header p  { font-size: 12px; color: var(--muted); }

    /* ── Área de mensajes ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 82%;
      animation: fadein .2s ease;
    }

    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai    { align-self: flex-start; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    .msg.user .msg-avatar { background: #d0cce8; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--bubble-me);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: var(--bubble-ai);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* Indicador de escritura */
    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px; }
    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

    /* ── Mensaje de bienvenida ── */
    .welcome {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
    }
    .welcome h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .welcome p  { font-size: 13px; }

    /* ── Sugerencias de inicio ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    .chip {
      padding: 7px 13px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      background: var(--surface);
      transition: border-color .15s, background .15s;
    }
    .chip:hover { border-color: var(--accent); background: #f0eeff; }

    /* ── Error ── */
    .error-msg {
      align-self: center;
      font-size: 12px;
      color: #c0392b;
      background: #fdf0ee;
      border: 1px solid #f5c6c0;
      border-radius: 8px;
      padding: 8px 14px;
    }

    /* ── Área de entrada ── */
    footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      outline: none;
      transition: border-color .15s;
    }
    #input:focus { border-color: var(--accent); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, opacity .15s;
    }
    #send-btn:hover  { background: var(--accent-h); }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; }

    footer small { display: block; text-align: center; font-size: 11px; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>

<div class="chat-app">

  <!-- Cabecera -->
  <header>
    <div class="avatar">🤖</div>
    <div>
      <h1>Mi Asistente IA</h1>
      <p>Impulsado por OpenRouter · Gratis</p>
    </div>
  </header>

  <!-- Mensajes -->
  <div id="messages">
    <div class="welcome">
      <h2>¡Hola! Soy tu asistente.</h2>
      <p>Puedo ayudarte con preguntas, redacción, código, ideas y mucho más.</p>
      <div class="suggestions">
        <button class="chip" onclick="sendChip(this)">¿Qué puedes hacer?</button>
        <button class="chip" onclick="sendChip(this)">Cuéntame un dato curioso</button>
        <button class="chip" onclick="sendChip(this)">Ayúdame a escribir un correo</button>
        <button class="chip" onclick="sendChip(this)">Explícame la IA en simple</button>
      </div>
    </div>
  </div>

  <!-- Entrada de texto -->
  <footer>
    <div class="input-row">
      <textarea
        id="input"
        rows="1"
        placeholder="Escribe tu mensaje…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
        </svg>
      </button>
    </div>
    <small>Tus mensajes se envían a OpenRouter · No guardes información sensible</small>
  </footer>

</div>

<script>
  // ════════════════════════════════════════════════
  // CONFIGURACIÓN
  // ════════════════════════════════════════════════

  // ⚠️ IMPORTANTE: Pega aquí tu API Key de OpenRouter.
  // Consíguela GRATIS en: https://openrouter.ai/settings/keys
  const API_KEY = "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";

  // "openrouter/free" selecciona automáticamente un modelo gratuito disponible.
  // Así nunca tendrás el error "No endpoints found" aunque cambien los modelos.
  // Si prefieres uno específico, puedes ver la lista en: https://openrouter.ai/models?q=free
  const MODEL = "openrouter/free";

  // Personalidad del asistente (puedes cambiarla como quieras)
  const SYSTEM_PROMPT = `Eres un asistente amigable, útil y conciso.
Respondes siempre en español a menos que el usuario escriba en otro idioma.
Cuando no sabes algo, lo dices con honestidad.`;

  // ════════════════════════════════════════════════
  // ESTADO DE LA CONVERSACIÓN
  // ════════════════════════════════════════════════

  // OpenRouter usa el mismo formato que Anthropic:
  // { role: "user" | "assistant", content: "texto" }
  let history = [];
  let isLoading = false;

  // ════════════════════════════════════════════════
  // UI: AGREGAR MENSAJES AL CHAT
  // ════════════════════════════════════════════════

  function addMessage(role, text) {
    const container = document.getElementById("messages");

    const welcome = container.querySelector(".welcome");
    if (welcome) welcome.remove();

    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = role === "user" ? "👤" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    container.appendChild(wrap);

    container.scrollTop = container.scrollHeight;
  }

  function addTypingIndicator() {
    const container = document.getElementById("messages");
    const wrap = document.createElement("div");
    wrap.className = "msg ai typing";
    wrap.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  function removeTypingIndicator() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function showError(msg) {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "error-msg";
    div.textContent = "⚠️ " + msg;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  // ════════════════════════════════════════════════
  // LÓGICA PRINCIPAL: LLAMAR A LA API DE OPENROUTER
  // ════════════════════════════════════════════════

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text || isLoading) return;

    // 1. Mostrar mensaje del usuario
    addMessage("user", text);

    // 2. Agregar al historial (mismo formato que Anthropic)
    history.push({ role: "user", content: text });

    // 3. Limpiar input
    input.value = "";
    input.style.height = "auto";
    setLoading(true);

    // 4. Mostrar indicador de escritura
    addTypingIndicator();

    try {
      // 5. Llamar a la API de OpenRouter
      //    La URL es siempre la misma, el modelo va dentro del body
      const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: MODEL,
          // El system prompt va como primer mensaje con role "system"
          messages: [
            { role: "system", content: SYSTEM_PROMPT },
            ...history   // luego todo el historial de la conversación
          ],
          max_tokens: 1024
        })
      });

      // 6. Manejar errores HTTP
      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `Error ${response.status}`);
      }

      // 7. Leer la respuesta
      //    OpenRouter devuelve: data.choices[0].message.content
      const data = await response.json();
      const reply = data.choices[0].message.content;

      // 8. Agregar respuesta al historial
      history.push({ role: "assistant", content: reply });

      // 9. Mostrar en el chat
      removeTypingIndicator();
      addMessage("ai", reply);

    } catch (err) {
      removeTypingIndicator();
      showError(err.message || "No se pudo conectar con la API.");
      history.pop();
    }

    setLoading(false);
  }

  // ════════════════════════════════════════════════
  // UTILIDADES
  // ════════════════════════════════════════════════

  function setLoading(state) {
    isLoading = state;
    document.getElementById("send-btn").disabled = state;
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
    document.getElementById("send-btn").disabled = el.value.trim() === "";
  }

  function sendChip(btn) {
    const input = document.getElementById("input");
    input.value = btn.textContent;
    sendMessage();
  }
</script>

</body>
</html>
